serenity {
  project.name = "EJERCICIO_1"
  take.screenshots = AFTER_EACH_STEP
  requirements {
    types = "feature"
  }
  features.directory = "src/test/resources/features"
}

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    acceptInsecureCerts = true
  }
}

headless {
  mode = false
}

chrome {
  switches = """--start-maximized;--test-type;--no-sandbox;
                --ignore-certificate-errors;--disable-popup-blocking;
                --disable-default-apps;--disable-extensions-file-access-check;
                --disable-blink-features=AutomationControlled"""
}

environments {
  default {
    webdriver.base.url = "http://opencart.abstracta.us"
  }
}